<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; media-src 'self' blob:; connect-src 'self' blob:;">
    <title>VoxMeet</title>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>VoxMeet</h1>
            <div class="version-info">
                <span id="version">Loading...</span>
            </div>
        </header>

        <main class="main-content">
            <div class="recorder-section">
                <div class="recorder-mode">
                    <label class="mode-switch">
                        <input type="radio" name="recordMode" value="microphone" checked>
                        <span class="mode-label">🎤 Mic</span>
                    </label>
                    <label class="mode-switch">
                        <input type="radio" name="recordMode" value="system">
                        <span class="mode-label">🔊 System Audio</span>
                    </label>
                    <label class="mode-switch">
                        <input type="radio" name="recordMode" value="mixed">
                        <span class="mode-label">🎤+🔊 Mixed</span>
                    </label>
                </div>

                <div class="permissions-section">
                    <div class="permission-item">
                        <div class="permission-status">
                            <span class="status-icon" id="microphoneStatus">⚪</span>
                            <span class="status-text">Microphone permission</span>
                        </div>
                        <button id="requestMicrophonePermission" class="btn btn-primary">
                            Grant
                        </button>
                    </div>
                    <div class="permission-item">
                        <div class="permission-status">
                            <span class="status-icon" id="systemAudioStatus">⚪</span>
                            <span class="status-text">System audio permission</span>
                        </div>
                        <button id="requestSystemAudioPermission" class="btn btn-primary">
                            Grant
                        </button>
                    </div>
                </div>
                
                <div class="recorder-controls">
                    <button id="startRecord" class="btn btn-primary">
                        <span class="icon">🎤</span>
                        Start Recording
                    </button>
                    <button id="stopRecord" class="btn btn-secondary" disabled>
                        <span class="icon">⏹️</span>
                        Stop Recording
                    </button>
                </div>

                <div class="audio-controls" style="display: none;">
                    <div class="audio-control-group">
                        <button id="micMuteBtn" class="mute-button">🎤</button>
                        <input type="range" id="micGainSlider" min="0" max="2.0" step="0.1" value="1.0">
                    </div>
                    <div class="audio-control-group">
                        <button id="systemMuteBtn" class="mute-button">🔊</button>
                        <input type="range" id="systemGainSlider" min="0" max="2.0" step="0.1" value="1.0">
                    </div>
                </div>

                <div class="recorder-status">
                    <div class="status-indicator">
                        <span id="recordingStatus">Ready</span>
                    </div>
                    <div class="time-display">
                        <span id="recordTime">00:00</span>
                    </div>
                </div>

                <div class="audio-visualizer">
                    <canvas id="visualizer" width="600" height="100"></canvas>
                </div>
            </div>

            <div class="recordings-section">
                <h2>Recordings</h2>
                <div class="recordings-list" id="recordingsList">
                    <p class="empty-message">No recordings yet</p>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
