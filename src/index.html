<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self';
        script-src 'self';
        style-src 'self' 'unsafe-inline';
        img-src 'self' data: blob:;
        media-src 'self' blob:;
        connect-src 'self';
        font-src 'self';
        object-src 'none';
        base-uri 'self';
        form-action 'none';">
    <title>录音应用</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>录音应用</h1>
            <div class="version-info">
                <span id="version">加载中...</span>
            </div>
        </header>

        <main class="main-content">
            <div class="recorder-section">
                <div class="recorder-controls">
                    <button id="startRecord" class="btn btn-primary">
                        <span class="icon">🎤</span>
                        开始录音
                    </button>
                    <button id="stopRecord" class="btn btn-secondary" disabled>
                        <span class="icon">⏹️</span>
                        停止录音
                    </button>
                    <button id="playRecord" class="btn btn-success" disabled>
                        <span class="icon">▶️</span>
                        播放录音
                    </button>
                </div>

                <div class="recorder-status">
                    <div class="status-indicator">
                        <span id="recordingStatus">准备就绪</span>
                    </div>
                    <div class="time-display">
                        <span id="recordTime">00:00</span>
                    </div>
                </div>

                <div class="audio-visualizer">
                    <canvas id="visualizer" width="600" height="100"></canvas>
                </div>
            </div>

            <div class="recordings-section">
                <h2>录音文件</h2>
                <div class="recordings-list" id="recordingsList">
                    <p class="empty-message">暂无录音文件</p>
                </div>
            </div>
        </main>
    </div>

    <script src="../dist/renderer.js"></script>
</body>
</html>
